<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Masmorra Arcana - O Quadrado Mágico das Moedas</title>
  
  <!-- Fontes Fantásticas -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=MedievalSharp&display=swap" rel="stylesheet">

  <style>
    :root {
      --stone-dark: #0f0d0c;
      --stone-mid: #24201e;
      --stone-light: #3d3734;
      --gold-main: #f3c242;
      --gold-glow: #ffe575;
      --magic-cyan: #00f0ff;
      --success-green: #2ecc71;
    }

    * {
      box-sizing: border-box;
    }

   body {
      margin: 0;
      padding: 0;
      background: #2b2b2b;
      color: #d1c7c2;
      font-family: 'MedievalSharp', cursive;
      height: 100vh;
      width: 100vw;
      display: flex;
      justify-content: center;
      align-items: center;
      user-select: none;
      overflow: hidden;
    }

   .wall-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      /* Imagem de textura de parede de pedra cinza perfeita para encaixe em loop (repeat) */
      background-image: 
        radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.1) 0%, rgba(0, 0, 0, 0.6) 100%),
        url('https://img.magnific.com/free-photo/brick-wall-background-texture_1048-17431.jpg?semt=ais_hybrid&w=740&q=80');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      box-shadow: inset 0 0 120px rgba(0, 0, 0, 0.8);
      border: none; /* Removida a borda/moldura em volta */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    /* Inscrição Entalhada Diretamente na Pedra */
   .riddle-header {
  text-align: center;
  max-width: 1200px;
  margin-bottom: 30px;
  padding: 10px 20px;
}

.riddle-text {
  font-family: 'Cinzel Decorative', serif;
  font-size: 2rem;
  /* Cor escura (quase preta) para simular o interior do entalhe sem luz */
  color: rgba(15, 12, 10, 0.85); 
  margin: 0;
  line-height: 1.7;
  letter-spacing: 2px;
  
  /* Funde o fundo da fenda com a textura abaixo dela */
  mix-blend-mode: multiply;

  /* EFEITO DE ESCULTURA PROFUNDA NA PEDRA/MADEIRA */
  text-shadow: 
    /* 1. Sombra interna superior (profundidade do sulco) */
    0px -2px 1px rgba(0, 0, 0, 0.9),
    /* 2. Borda inferior iluminada (luz refletindo na quina da fenda) */
    0px 2px 1px rgba(255, 255, 255, 0.35),
    /* 3. Sombra projetada leve na lateral */
    -1px 0px 1px rgba(0, 0, 0, 0.7);
}

    /* Painel do Quebra-Cabeça */
    .puzzle-main {
      display: flex;
      gap: 70px;
      align-items: center;
      justify-content: center;
    }

    /* Grade 3x3 de Buracos de Pedra */
    .grid-3x3 {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 15px;
      background: #3b3a3a;
      padding: 20px;
     
      box-shadow: 
        inset 0 0 35px #000,
        0 10px 25px rgba(0, 0, 0, 0.9),
        0 0 0 4px #2b2320;
      position: relative;
    }

    /* Cada Fenda/Slot na Pedra */
    .slot {
      width: 110px;
      height: 110px;
      background: #181413;
      border-radius: 50%;
      border: 3px solid #0a0808;
      box-shadow: inset 0 0 20px #000, 0 1px 2px rgba(255,255,255,0.1);
      display: flex;
      justify-content: center;
      align-items: center;
      transition: all 0.3s ease;
      position: relative;
      opacity: .7;
    }

    .slot.hovered {
      border-color: var(--magic-cyan);
      box-shadow: inset 0 0 20px var(--magic-cyan);
    }

    /* Pote/Tigela Circular de Pedra Visto de Cima */
    .coin-bowl {
      width: 400px;
      height: 350px;
      background: radial-gradient(circle at 50% 50%, #120e0d 0%, #1c1715 65%, #2e2623 90%, #120e0d 100%);
      border-radius: 50%;
      border: 10px solid #28201d;
      /* Efeito 3D de Profundidade para dentro do chão/pedra */
      box-shadow: 
        inset 0 0 45px #000,
        inset 0 10px 30px rgba(0, 0, 0, 0.9),
        0 12px 25px rgba(0, 0, 0, 0.8),
        0 0 0 3px #120f0e;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 25px;
      position: relative;
    }

    .coins-container {
      display: grid;
      grid-template-columns: repeat(3, 75px);
      grid-template-rows: repeat(3, 75px);
      gap: 10px;
      justify-content: center;
      align-items: center;
    }

    /* Moedas Douradas Estilizadas */
    .coin {
      width: 75px;
      height: 75px;
      background: radial-gradient(circle at 35% 35%, #ffe875 0%, #d49a19 70%, #7a5002 100%);
      border-radius: 50%;
      border: 3px solid #fce888;
      box-shadow: 
        0 5px 10px rgba(0, 0, 0, 0.7),
        inset 0 0 8px rgba(255, 255, 255, 0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Cinzel Decorative', serif;
      font-size: 2rem;
      font-weight: bold;
      color: #2b1800;
      text-shadow: 1px 1px 0px rgba(255, 255, 255, 0.4);
      cursor: grab;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .coin:hover {
      transform: scale(1.08);
      box-shadow: 
        0 0 15px var(--gold-glow),
        inset 0 0 10px rgba(255, 255, 255, 0.9);
    }

    .coin.selected {
      transform: scale(1.15);
      border-color: var(--magic-cyan);
      box-shadow: 0 0 20px var(--magic-cyan);
      cursor: grabbing;
    }

    .coin.dragging {
      opacity: 0.4;
    }

    /* Efeito de Sucesso/Resolução */
    .wall-container.solved .grid-3x3 {
      border-color: var(--success-green);
      box-shadow: 0 0 40px var(--success-green), inset 0 0 20px #000;
      animation: pulseSuccess 2s infinite alternate;
    }

    .wall-container.solved .coin {
      background: radial-gradient(circle at 35% 35%, #adff2f 0%, #27ae60 70%, #0d381e 100%);
      border-color: #7bed9f;
      color: #03210e;
      text-shadow: none;
      box-shadow: 0 0 15px var(--success-green);
    }

    @keyframes pulseSuccess {
      0% { box-shadow: 0 0 25px var(--success-green); }
      100% { box-shadow: 0 0 50px var(--success-green); }
    }

    /* Partículas de Vitória */
    .particle {
      position: absolute;
      pointer-events: none;
      border-radius: 50%;
      animation: fadeParticle 1s ease-out forwards;
      z-index: 100;
    }

    @keyframes fadeParticle {
      0% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(2.5) translateY(-30px); }
    }
  </style>
</head>
<body>

  <div class="wall-container" id="wall">
    <header class="riddle-header">
      <p class="riddle-text">
        QUINZE POR COLUNA, QUINZE NA HORIZONTAL;<br/>
        SEGUINDO A MESMA LÓGICA NA DIAGONAL.<br/>
        ALIMENTE A PORTA COM A QUANTIA AO CENTRO!
      </p>
    </header>

    <div class="puzzle-main">
      <!-- Grade 3x3 de Pedra -->
      <div class="grid-3x3" id="grid">
        <div class="slot" data-index="0"></div>
        <div class="slot" data-index="1"></div>
        <div class="slot" data-index="2"></div>
        <div class="slot" data-index="3"></div>
        <div class="slot" data-index="4"></div>
        <div class="slot" data-index="5"></div>
        <div class="slot" data-index="6"></div>
        <div class="slot" data-index="7"></div>
        <div class="slot" data-index="8"></div>
      </div>

      <!-- Pote Circular de Pedra Visto de Cima -->
      <div class="coin-bowl" id="coin-bowl">
        <div class="coins-container" id="coin-pool">
          <!-- Moedas geradas de 1 a 9 via JS -->
        </div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const coinPool = document.getElementById('coin-pool');
      const slots = document.querySelectorAll('.slot');
      const wall = document.getElementById('wall');

      let selectedCoin = null;
      let isSolved = false;

      // Solução Oficial do Livro:
      // [6, 1, 8]
      // [7, 5, 3]
      // [2, 9, 4]
      const solution = [6, 1, 8, 7, 5, 3, 2, 9, 4];

      // Array para manter o estado atual da grade 3x3
      const currentGrid = Array(9).fill(null);

      // Criar as 9 moedas com valores de 1 a 9
      for (let val = 1; val <= 9; val++) {
        createCoin(val);
      }

      function createCoin(value) {
        const coin = document.createElement('div');
        coin.className = 'coin';
        coin.textContent = value;
        coin.dataset.value = value;
        coin.setAttribute('draggable', 'true');

        // Seleção por Clique
        coin.addEventListener('click', (e) => {
          e.stopPropagation();
          if (isSolved) return;

          if (selectedCoin === coin) {
            deselectCoin();
          } else {
            deselectCoin();
            selectedCoin = coin;
            coin.classList.add('selected');
          }
        });

        // Drag and Drop
        coin.addEventListener('dragstart', (e) => {
          if (isSolved) return;
          deselectCoin();
          coin.classList.add('dragging');
          e.dataTransfer.setData('text/plain', value);
        });

        coin.addEventListener('dragend', () => {
          coin.classList.remove('dragging');
        });

        coinPool.appendChild(coin);
      }

      // Configuração dos Slots (Fendas) da Grade
      slots.forEach(slot => {
        const slotIndex = parseInt(slot.dataset.index);

        slot.addEventListener('dragover', (e) => {
          e.preventDefault();
          if (!isSolved) slot.classList.add('hovered');
        });

        slot.addEventListener('dragleave', () => {
          slot.classList.remove('hovered');
        });

        slot.addEventListener('drop', (e) => {
          e.preventDefault();
          slot.classList.remove('hovered');
          if (isSolved) return;

          const coinVal = parseInt(e.dataTransfer.getData('text/plain'));
          const coinElem = document.querySelector(`.coin[data-value="${coinVal}"]`);

          if (coinElem) {
            placeCoinInSlot(coinElem, slot, slotIndex);
          }
        });

        slot.addEventListener('click', () => {
          if (isSolved) return;

          // Se o slot já tem uma moeda, devolve para o pote
          if (currentGrid[slotIndex] !== null) {
            removeCoinFromSlot(slotIndex);
            deselectCoin();
            return;
          }

          // Se há uma moeda selecionada via clique, insere no slot
          if (selectedCoin) {
            placeCoinInSlot(selectedCoin, slot, slotIndex);
            deselectCoin();
          }
        });
      });

      // Clicar no pote limpa a seleção
      document.getElementById('coin-bowl').addEventListener('click', () => {
        deselectCoin();
      });

      function placeCoinInSlot(coinEl, slotEl, slotIndex) {
        const previousSlotIndex = currentGrid.indexOf(parseInt(coinEl.dataset.value));
        if (previousSlotIndex !== -1) {
          currentGrid[previousSlotIndex] = null;
        }

        if (currentGrid[slotIndex] !== null) {
          removeCoinFromSlot(slotIndex);
        }

        slotEl.appendChild(coinEl);
        currentGrid[slotIndex] = parseInt(coinEl.dataset.value);

        createParticles(slotEl, 'var(--gold-glow)', 8);
        checkSolution();
      }

      function removeCoinFromSlot(slotIndex) {
        const val = currentGrid[slotIndex];
        if (val !== null) {
          const coinEl = document.querySelector(`.coin[data-value="${val}"]`);
          if (coinEl) {
            coinPool.appendChild(coinEl);
          }
          currentGrid[slotIndex] = null;
        }
      }

      function deselectCoin() {
        if (selectedCoin) {
          selectedCoin.classList.remove('selected');
          selectedCoin = null;
        }
      }

      function checkSolution() {
        if (currentGrid.includes(null)) return;

        let correct = true;
        for (let i = 0; i < 9; i++) {
          if (currentGrid[i] !== solution[i]) {
            correct = false;
            break;
          }
        }

        if (correct) {
          isSolved = true;
          wall.classList.add('solved');

          for (let i = 0; i < 50; i++) {
            setTimeout(() => {
              const rx = window.innerWidth / 2 + (Math.random() * 400 - 200);
              const ry = window.innerHeight / 2 + (Math.random() * 400 - 200);
              createParticleAt(rx, ry, 'var(--gold-glow)');
            }, i * 25);
          }
        }
      }

      function createParticles(element, color, count) {
        const rect = element.getBoundingClientRect();
        for (let i = 0; i < count; i++) {
          const x = rect.left + rect.width / 2;
          const y = rect.top + rect.height / 2;
          createParticleAt(x, y, color);
        }
      }

      function createParticleAt(x, y, color) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = `${x + (Math.random() * 40 - 20)}px`;
        p.style.top = `${y + (Math.random() * 40 - 20)}px`;
        p.style.width = `${Math.random() * 8 + 4}px`;
        p.style.height = p.style.width;
        p.style.background = color;
        p.style.boxShadow = `0 0 10px ${color}`;

        document.body.appendChild(p);

        setTimeout(() => p.remove(), 1000);
      }
    });
  </script>
</body>
</html>
