<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha de Personagem - Faz de Conta RPG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ficha-container">
        <header>
            <img src="logo.png" alt="Faz de Conta RPG" class="logo">
            <h1>Ficha de Personagem</h1>
        </header>

        <section class="cabecalho">
            <div class="campo">
                <label>NOME:</label>
                <input type="text" id="nome-personagem" placeholder="Ex: Paulo">
            </div>
            <div class="campo">
                <label>JOGADOR:</label>
                <input type="text" id="nome-jogador">
            </div>
            <div class="campo">
                <label>CLASSE:</label>
                <select id="classe-select" onchange="atualizarClasse()">
                    <option value="">Selecione uma Classe...</option>
                    <option value="Guerreiro">O Guerreiro</option>
                    <option value="Amazona">A Amazona</option>
                    <option value="Mago">O Mago</option>
                    <option value="Elementalista">A Elementalista</option>
                    <option value="Arqueiro">O Arqueiro</option>
                    <option value="Caçadora">A Caçadora</option>
                    <option value="Bárbaro">O Bárbaro</option>
                    <option value="Druida">A Druida</option>
                    <option value="Monge">O Monge</option>
                    <option value="Alquimista">A Alquimista</option>
                    <option value="Aventureiro">O Aventureiro</option>
                    <option value="Exploradora">A Exploradora</option>
                    <option value="Bardo">O Bardo</option>
                    <option value="Dançarina">A Dançarina</option>
                    <option value="Paladino">O Paladino</option>
                    <option value="Defensora">A Defensora</option>
                    <option value="Domador">O Domador</option>
                    <option value="Fazendeira">A Fazendeira</option>
                    <option value="Engenhoqueiro">O Engenhoqueiro</option>
                    <option value="Inventora">A Inventora</option>
                    <option value="Samurai">O Samurai</option>
                    <option value="Ninja">A Ninja</option>
                    <option value="Vigilante">O Vigilante</option>
                    <option value="Fada">A Fada</option>
                </select>
            </div>
        </section>

        <div class="main-content">
            <div class="coluna-esq">
                <section class="vida-container">
                    <label>PONTOS DE VIDA (PV):</label>
                    <div class="coracoes" id="pv-container">
                        </div>
                </section>

                <section class="atributos">
                    <h3>ATRIBUTOS</h3>
                    <div class="attr-grid">
                        <div class="attr-item"><span>👊 Força</span> <input type="number" id="attr-forca"></div>
                        <div class="attr-item"><span>🛡️ Defesa</span> <input type="number" id="attr-defesa"></div>
                        <div class="attr-item"><span>🧠 Inteligência</span> <input type="number" id="attr-int"></div>
                        <div class="attr-item"><span>🏃 Movimento</span> <input type="text" id="attr-mov"></div>
                        <div class="attr-item"><span>💰 Bolsa</span> <input type="number" id="attr-bolsa"></div>
                    </div>
                </section>
            </div>

            <div class="coluna-dir">
                <section class="pericia">
                    <h3>PERÍCIA / ARMA</h3>
                    <input type="text" id="pericia-nome" placeholder="Arma ou Técnica">
                    <div class="alcance">Alcance: <input type="number" id="pericia-alcance"></div>
                </section>

                <section class="especial">
                    <h3>* ESPECIAL</h3>
                    <textarea id="especial-desc" rows="4"></textarea>
                </section>
                <section class="tesouros-section">
    <h3>💰 Cartas de Tesouro</h3>
    <div class="gerenciador-cartas">
        <select id="seletor-tesouros">
            <option value="">Escolha um Tesouro para adicionar...</option>
            </select>
        <button onclick="adicionarCarta()">Adicionar à Bolsa</button>
    </div>
    <div id="lista-cartas" class="cartas-grid">
        </div>
</section>
            </div>
        </div>

        <footer class="extras">
            <div class="xp-container">
                <label>XP:</label>
                <input type="number" id="xp-pontos" value="0">
            </div>
            <div class="anotacoes">
                <label>ANOTAÇÕES:</label>
                <textarea id="anotacoes"></textarea>
            </div>
        </footer>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
